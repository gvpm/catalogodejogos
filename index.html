<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Catálogo de Jogos</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #121212;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px;
        }

        .games-container {

            display: grid;

            grid-template-columns:
                repeat(3, 220px);

            justify-content: center;

            gap: 20px;

        }

        .game-card {
            position: relative;

            background: #1e1e1e;
            border-radius: 16px;
            overflow: hidden;

            transition: .2s ease;

            cursor: pointer;
        }

        .game-card:hover {
            transform: scale(1.03);
        }

        .game-image {
            width: 100%;
            aspect-ratio: 1 / 1.35;
            object-fit: cover;
            background: #2b2b2b;
        }

        .game-info {
            padding: 12px;
            text-align: center;
        }

        .game-title {
            font-size: 1rem;
            font-weight: bold;
            line-height: 1.3;
        }

        .favorite-button {
            position: absolute;

            top: 10px;
            right: 10px;

            width: 38px;
            height: 38px;

            border: none;
            border-radius: 50%;

            background: rgba(0, 0, 0, .38);

            color: white;

            font-size: 1.2rem;

            display: flex;
            align-items: center;
            justify-content: center;

            cursor: pointer;

            z-index: 10;

            backdrop-filter: blur(1px);

            transition: .2s ease;
        }

        .favorite-button.active {
            color: #ff4d6d;
        }

        .modal-favorite-button {
            position: absolute;

            top: 14px;
            right: 14px;

            width: 46px;
            height: 46px;

            border: none;
            border-radius: 50%;

            background: rgba(0, 0, 0, .42);

            color: white;

            font-size: 1.4rem;

            display: flex;
            align-items: center;
            justify-content: center;

            cursor: pointer;

            z-index: 30;

            backdrop-filter: blur(1px);

            transition: .2s ease;
        }

        .modal-favorite-button.active {
            color: #ff4d6d;
        }

        .modal {
            position: fixed;
            inset: 0;

            background: rgba(0, 0, 0, .92);

            opacity: 0;
            pointer-events: none;

            transition: .2s ease;

            z-index: 999;

            overflow-y: auto;

            padding: 20px;
        }

        .modal.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            position: relative;

            max-width: 700px;
            width: 100%;

            margin: 40px auto;

            background: #1b1b1b;

            border-radius: 20px;

            overflow: hidden;

            animation: zoom .2s ease;
        }

        .close-button {
            position: absolute;

            top: 14px;
            left: 14px;

            width: 42px;
            height: 42px;

            border: none;
            border-radius: 50%;

            background: rgba(0, 0, 0, .42);

            color: white;

            font-size: 1.4rem;

            cursor: pointer;

            z-index: 30;

            display: flex;
            align-items: center;
            justify-content: center;

            backdrop-filter: blur(1px);

            transition: .2s ease;
        }

        .close-button:hover {
            background: rgba(0, 0, 0, .95);
        }

        .modal-image {
            width: 100%;
            max-height: 75vh;

            object-fit: contain;

            background: #222;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-title {
            text-align: center;

            margin-top: 10px;

            font-size: 1.3rem;
            font-weight: bold;
        }

        .modal-rules {
            margin-top: 20px;

            line-height: 1.7;

            color: #ddd;

            white-space: pre-line;

            text-align: left;
        }

        .modal-rules h3 {
            margin-top: 18px;
            margin-bottom: 8px;

            color: white;
        }

        body.modal-open {
            overflow: hidden;
        }

        @keyframes zoom {
            from {
                transform: scale(.92);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .games-count {
            margin-top: 28px;

            text-align: center;

            color: rgba(255, 255, 255, .6);

            font-size: .95rem;
        }

        .floating-menu {
            position: fixed;

            right: 20px;
            bottom: 20px;

            z-index: 9999;
        }

        .menu-button {
            width: 58px;
            height: 58px;

            border: none;
            border-radius: 50%;

            background: rgba(31, 31, 31, 0.849);

            backdrop-filter: blur(3px);

            color: white;

            font-size: 1.5rem;

            cursor: pointer;

            box-shadow: 0 4px 18px rgba(0, 0, 0, .35);
        }

        .filters-panel {
            position: absolute;

            right: 190px;
            bottom: 74px;

            width: 260px;

            background: #1b1b1b;

            border-radius: 18px;

            padding: 18px;

            opacity: 0;
            pointer-events: none;

            transform: translateY(10px);

            transition: .2s ease;
        }

        .menu-panel {
            position: absolute;

            right: 0;
            bottom: 74px;

            width: 180px;

            background: #1b1b1b;

            border-radius: 18px;

            padding: 12px;

            opacity: 0;
            pointer-events: none;

            transform: translateY(10px);

            transition: .2s ease;
        }

        .menu-panel.active {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0);
        }

        .menu-option {
            width: 100%;

            border: none;

            background: #262626;

            color: white;

            padding: 14px;

            border-radius: 12px;

            cursor: pointer;

            font-size: 1rem;

            text-align: left;
        }

        .clear-filters-button {
            margin-top: 10px;

            background: #5a1d1d;

            color: #ff8d8d;

            display: none;
        }

        .clear-filters-button.active {
            display: block;
        }

        .filters-panel.active {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0);
        }

        .filters-title {
            font-size: 1rem;
            font-weight: bold;

            margin-bottom: 14px;
        }

        .range-values {
            display: flex;
            justify-content: center;

            margin-bottom: 10px;

            color: #aaa;
        }

        .range-group {
            position: relative;
        }

        .range-group input {
            width: 100%;
        }

        .dice-modal {

            position: fixed;
            inset: 0;

            background: rgba(0, 0, 0, .92);

            z-index: 99999;

            display: flex;

            align-items: center;
            justify-content: center;

            opacity: 0;
            pointer-events: none;

            transition: .2s ease;

            padding: 20px;

        }

        .dice-modal.active {
            opacity: 1;
            pointer-events: all;
        }

        .dice-content {

            position: relative;

            width: 100%;
            max-width: 520px;

            background: #1b1b1b;

            border-radius: 24px;

            padding: 32px 24px;

            animation: zoom .2s ease;

        }

        .dice-icon {

            font-size: 4rem;

            text-align: center;

            margin-bottom: 12px;

        }

        .dice-result {

            text-align: center;

            font-size: 4rem;

            font-weight: bold;

            margin-bottom: 18px;

        }

        .timer-finished {
            color: #ff4d6d;
        }

        .dice-input-wrapper {

            display: flex;

            align-items: center;
            justify-content: center;

            gap: 10px;

            margin-bottom: 24px;

        }

        .dice-label {

            font-size: 2rem;

            font-weight: bold;

            color: #aaa;

        }

        .dice-input {

            width: 120px;

            background: #262626;

            border: none;

            border-radius: 16px;

            padding: 16px;

            text-align: center;

            color: white;

            font-size: 2rem;

            outline: none;

        }

        .dice-roll-button {

            width: 100%;

            border: none;

            border-radius: 18px;

            background: #2f2f2f;

            color: white;

            padding: 18px;

            font-size: 1.1rem;

            cursor: pointer;

            transition: .2s ease;

        }

        .dice-roll-button:hover {
            background: #3a3a3a;
        }

        .dice-loading {

            opacity: .7;

            pointer-events: none;
        }

        @keyframes spin {

            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }

        }

        .dice-spinner {

            width: 70px;
            height: 70px;

            border-radius: 50%;

            border: 6px solid rgba(255, 255, 255, .15);

            border-top-color: white;

            margin: 0 auto 18px auto;

            animation: spin .8s linear infinite;

        }

        .timer-inputs {

            display: flex;

            justify-content: center;

            gap: 18px;

            margin-bottom: 24px;

        }

        .timer-group {

            display: flex;

            flex-direction: column;

            align-items: center;

            gap: 8px;

        }

        .timer-label {

            color: #aaa;

            font-size: .95rem;

        }

        .timer-buttons {

            display: flex;

            flex-direction: column;

            gap: 12px;

        }

        @media (max-width:700px) {

            body {
                padding: 16px;
            }

            .games-container {

                grid-template-columns:
                    repeat(2, calc(50vw - 24px)) !important;

                gap: 14px !important;

                justify-content: center !important;

            }

            .game-card {
                width: 100%;
            }

            .game-title {
                font-size: 1rem;
            }

            .game-info {
                padding: 14px;
            }

            .menu-button {
                width: 86px !important;
                height: 86px !important;

                font-size: 2rem !important;
            }

            .favorite-button {

                width: 42px !important;
                height: 42px !important;

                font-size: 1.5rem !important;
            }

            .modal-favorite-button {

                width: 52px !important;
                height: 52px !important;

                font-size: 1.8rem !important;
            }

            .close-button {
                width: 52px !important;
                height: 52px !important;

                font-size: 1.8rem !important;
            }

            .menu-panel {

                width: 220px !important;

                bottom: 96px !important;
            }

            .filters-panel {

                width: 240px !important;

                right: 0 !important;

                bottom: 180px !important;
            }

            .menu-option {

                padding: 20px !important;

                font-size: 1.08rem !important;
            }

            .range-group input {

                height: 40px !important;
            }

        }

        .finger-status {

            text-align: center;

            font-size: 1.15rem;

            margin-top: 20px;

            color: white;

            min-height: 32px;
        }

        .finger-area {

            position: relative;

            width: 100%;
            height: 340px;

            margin-top: 20px;

            border-radius: 18px;

            background: #202020;

            overflow: hidden;

            touch-action: none;

            -webkit-touch-callout: none;

            -webkit-user-select: none;
            user-select: none;

            -webkit-tap-highlight-color:
                transparent;
        }

        .finger-point {

            position: absolute;

            width: 90px;
            height: 90px;

            border-radius: 50%;

            background: rgba(255, 255, 255, .08);

            border: 2px solid rgba(255, 255, 255, .22);

            transform: translate(-50%, -50%);

            transition: .15s ease;
        }

        .finger-point.selected {

            background: #ff4d6d;

            animation: fingerBlink .8s infinite;
        }

        .finger-loading {

            text-align: center;

            margin-top: 18px;

            font-size: 2rem;

            opacity: 0;

            transition: .2s ease;
        }

        .finger-loading.active {

            opacity: 1;

            animation: spin 1s linear infinite;
        }

        @keyframes fingerBlink {

            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }

            50% {
                transform: translate(-50%, -50%) scale(1.15);
                opacity: .55;
            }

            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }

        }

        @keyframes spin {

            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }

        }
    </style>
</head>

<body>

    <div class="games-container" id="gamesContainer"></div>

    <div class="games-count" id="gamesCount"></div>
    <div class="modal" id="gameModal">

        <div class="modal-content">

            <button class="close-button" id="closeButton">✕</button>

            <button class="modal-favorite-button" id="modalFavoriteButton">
                ♥
            </button>
            <img id="modalImage" class="modal-image">

            <div class="modal-body">

                <div id="modalTitle" class="modal-title"></div>

                <div id="modalRules" class="modal-rules"></div>

            </div>

        </div>

    </div>
    <div class="dice-modal" id="diceModal">

        <div class="dice-content">

            <button class="close-button" id="diceCloseButton">
                ✕
            </button>

            <div class="dice-icon">
                🎲
            </div>

            <div class="dice-result" id="diceResult">
                ?
            </div>

            <div class="dice-input-wrapper">

                <div class="dice-label">
                    D
                </div>

                <input type="number" min="2" value="6" id="diceInput" class="dice-input">

            </div>

            <button class="dice-roll-button" id="diceRollButton">

                Lançar Dado!

            </button>

        </div>

    </div>
    <div class="dice-modal" id="timerModal">

        <div class="dice-content">

            <button class="close-button" id="timerCloseButton">
                ✕
            </button>

            <div class="dice-icon">
                ⏱
            </div>

            <div class="dice-result" id="timerDisplay">

                01:30

            </div>

            <div class="timer-inputs">

                <div class="timer-group">

                    <div class="timer-label">
                        Min
                    </div>

                    <input type="number" id="minutesInput" class="dice-input" min="0" max="59" value="1">

                </div>

                <div class="timer-group">

                    <div class="timer-label">
                        Seg
                    </div>

                    <input type="number" id="secondsInput" class="dice-input" min="0" max="59" value="30">

                </div>

            </div>

            <div class="timer-buttons">

                <button class="dice-roll-button" id="startTimerButton">

                    Iniciar

                </button>

                <button class="dice-roll-button" id="pauseTimerButton">

                    Pausar

                </button>

                <button class="dice-roll-button" id="stopTimerButton">

                    Stop

                </button>

            </div>

        </div>

    </div>
    <div class="modal" id="fingerSelectorModal">

        <div class="modal-content timer-content">

            <button class="close-button" id="closeFingerSelectorButton">
                ✕
            </button>

            <div class="timer-body">

                <div class="timer-icon"></div>

                <div class="finger-status" id="fingerStatus">

                    Coloque os dedos.

                </div>

                <div class="finger-area" id="fingerArea">
                </div>

                <div class="finger-loading" id="fingerLoading">

                    ⟳

                </div>

            </div>

        </div>

    </div>
    <div class="floating-menu">

        <div class="menu-panel" id="menuPanel">
            <button class="menu-option" id="catalogButton">
                🏠 Catálogo
            </button>

            <button class="menu-option" id="filtersButton">
                ⛃ Filtros
            </button>

            <button class="menu-option" id="diceButton">
                🎲 Dado
            </button>
            <button class="menu-option" id="fingerSelectorButton">
                ☝️ Seletor de dedo
            </button>
            <button class="menu-option" id="timerButton">
                ⏱ Timer
            </button>

            <button class="menu-option clear-filters-button" id="clearFiltersButton">

                🗑 Limpar filtros

            </button>

        </div>

        <div class="filters-panel" id="filtersPanel">

            <div class="filters-title">
                Jogadores
            </div>

            <div class="range-values">
                <span id="playersLabel"></span>
            </div>

            <div class="range-group">
                <input type="range" id="playersRange">
            </div>

        </div>

        <button class="menu-button" id="menuButton">
            ☰
        </button>

    </div>

    <script>

        const container = document.getElementById('gamesContainer');
        const gamesCount =
            document.getElementById('gamesCount');

        const modal = document.getElementById('gameModal');

        const modalImage = document.getElementById('modalImage');
        const modalTitle = document.getElementById('modalTitle');
        const modalRules = document.getElementById('modalRules');

        const modalFavoriteButton =
            document.getElementById('modalFavoriteButton');

        const menuButton =
            document.getElementById('menuButton');

        const filtersPanel =
            document.getElementById('filtersPanel');

        const playersRange =
            document.getElementById('playersRange');

        const playersLabel =
            document.getElementById('playersLabel');

        const closeButton =
            document.getElementById('closeButton');

        const menuPanel =
            document.getElementById('menuPanel');

        const filtersButton =
            document.getElementById('filtersButton');


        const clearFiltersButton =
            document.getElementById('clearFiltersButton');

        const diceButton =
            document.getElementById('diceButton');
        const fingerSelectorButton =
            document.getElementById(
                'fingerSelectorButton'
            );

        const fingerSelectorModal =
            document.getElementById(
                'fingerSelectorModal'
            );

        const closeFingerSelectorButton =
            document.getElementById(
                'closeFingerSelectorButton'
            );

        const fingerArea =
            document.getElementById(
                'fingerArea'
            );

        const fingerStatus =
            document.getElementById(
                'fingerStatus'
            );

        const fingerLoading =
            document.getElementById(
                'fingerLoading'
            );

        const diceModal =
            document.getElementById('diceModal');

        const diceCloseButton =
            document.getElementById('diceCloseButton');

        const diceRollButton =
            document.getElementById('diceRollButton');

        const diceInput =
            document.getElementById('diceInput');

        const diceResult =
            document.getElementById('diceResult');

        const catalogButton =
            document.getElementById('catalogButton');

        const timerButton =
            document.getElementById('timerButton');

        const timerModal =
            document.getElementById('timerModal');

        const timerCloseButton =
            document.getElementById('timerCloseButton');

        const timerDisplay =
            document.getElementById('timerDisplay');

        const minutesInput =
            document.getElementById('minutesInput');

        const secondsInput =
            document.getElementById('secondsInput');

        const startTimerButton =
            document.getElementById('startTimerButton');

        const pauseTimerButton =
            document.getElementById('pauseTimerButton');

        const stopTimerButton =
            document.getElementById('stopTimerButton');

        const timerInputs =
            document.querySelector('.timer-inputs');
        let allGames = [];

        let globalMinPlayers = 1;
        let globalMaxPlayers = 12;

        let currentPlayers = null;


        function getFavorites() {

            return JSON.parse(
                localStorage.getItem('favoriteGames') || '[]'
            );

        }

        function saveFavorites(favorites) {

            localStorage.setItem(
                'favoriteGames',
                JSON.stringify(favorites)
            );

        }

        function toggleFavorite(gameTitle) {

            let favorites = getFavorites();

            const index = favorites.indexOf(gameTitle);

            if (index >= 0) {

                favorites.splice(index, 1);

            } else {

                favorites.push(gameTitle);

            }

            saveFavorites(favorites);

            renderGames();

        }
        function updateFiltersUI() {

            const hasFilter =
                currentPlayers !== null;

            clearFiltersButton.classList.toggle(
                'active',
                hasFilter
            );

        }

        function renderGames() {

            container.innerHTML = '';

            const favorites = getFavorites();

            const favoriteGames = [];
            const normalGames = [];

            allGames
                .filter(game => {

                    if (
                        game.minPlayers === 0 &&
                        game.maxPlayers === 0
                    ) {
                        return true;
                    }

                    if (currentPlayers === null) {
                        return true;
                    }

                    return (
                        currentPlayers >= game.minPlayers &&
                        currentPlayers <= game.maxPlayers
                    );

                })
                .forEach(game => {

                    if (favorites.includes(game.title)) {

                        favoriteGames.push(game);

                    } else {

                        normalGames.push(game);

                    }

                });

            favoriteGames.sort((a, b) =>
                favorites.indexOf(a.title) - favorites.indexOf(b.title)
            );

            normalGames.sort((a, b) =>
                a.title.localeCompare(
                    b.title,
                    'pt-BR',
                    { sensitivity: 'base' }
                )
            );

            const orderedGames = [
                ...favoriteGames,
                ...normalGames
            ];
            gamesCount.innerText =
                `${orderedGames.length} Jogos`;

            orderedGames.forEach(game => {

                const isFavorite =
                    favorites.includes(game.title);

                const card = document.createElement('div');

                card.className = 'game-card';

                card.innerHTML = `

                    <button class="favorite-button ${isFavorite ? 'active' : ''}">
                        ♥
                    </button>

                    <img src="images/${game.image}" class="game-image">

                    <div class="game-info">

                        <div class="game-title">${game.title}</div>

                    </div>
                `;

                const favoriteButton =
                    card.querySelector('.favorite-button');

                favoriteButton.addEventListener('click', (e) => {

                    e.stopPropagation();

                    toggleFavorite(game.title);

                });

                card.addEventListener('click', () => {

                    modalImage.src = `images/${game.image}`;

                    modalTitle.innerText = game.title;

                    modalRules.innerHTML = game.rules ?? "";

                    const favorites = getFavorites();

                    modalFavoriteButton.classList.toggle(
                        'active',
                        favorites.includes(game.title)
                    );

                    modalFavoriteButton.onclick = (e) => {

                        e.stopPropagation();

                        toggleFavorite(game.title);

                        modalFavoriteButton.classList.toggle(
                            'active'
                        );

                    };

                    modal.classList.add('active');

                    document.body.classList.add('modal-open');

                    history.pushState({ modal: true }, "");

                });

                container.appendChild(card);

            });
            updateFiltersUI();


        }

        fetch('./jogos.json')
            .then(response => response.json())
            .then(games => {

                allGames = games;
                const validGames = games.filter(g => {

                    return (
                        Number.isFinite(Number(g.minPlayers)) &&
                        Number.isFinite(Number(g.maxPlayers)) &&
                        Number(g.minPlayers) > 0 &&
                        Number(g.maxPlayers) > 0
                    );

                });

                if (validGames.length > 0) {

                    globalMinPlayers = Math.min(
                        ...validGames.map(g =>
                            Number(g.minPlayers)
                        )
                    );

                    globalMaxPlayers = Math.max(
                        ...validGames.map(g =>
                            Number(g.maxPlayers)
                        )
                    );

                } else {

                    globalMinPlayers = 1;
                    globalMaxPlayers = 12;

                }

                currentPlayers = null;

                playersRange.min = globalMinPlayers;
                playersRange.max = globalMaxPlayers;

                playersRange.value = globalMinPlayers;

                playersLabel.innerText =
                    '? jogadores';
                renderGames();

            });

        function closeModal() {

            modal.classList.remove('active');

            document.body.classList.remove('modal-open');

        }

        closeButton.addEventListener('click', closeModal);

        modal.addEventListener('click', (e) => {

            if (e.target === modal) {

                closeModal();

            }

        });

        window.addEventListener('popstate', () => {

            if (modal.classList.contains('active')) {

                closeModal();

            }

        });

        menuButton.addEventListener('click', (e) => {
            if (
                fingerSelectorModal.classList.contains(
                    'active'
                )
            ) {
                return;
            }

            e.stopPropagation();

            menuPanel.classList.toggle('active');

            filtersPanel.classList.remove('active');

        });

        filtersButton.addEventListener('click', (e) => {

            e.stopPropagation();

            filtersPanel.classList.toggle('active');

        });

        playersRange.addEventListener('input', () => {

            currentPlayers =
                Number(playersRange.value);

            playersLabel.innerText =
                `${currentPlayers} jogadores`;

            renderGames();

        });

        let activeTouches = new Map();

        let selectorTimeout = null;

        let selectedFingerId = null;
        let resultTimeout = null;
        let fingerSelectionLocked = false;
        let cooldownStarted = false;

        function resetFingerSelection() {

            clearTimeout(selectorTimeout);

            selectedFingerId = null;

            fingerLoading.classList.remove(
                'active'
            );

            document
                .querySelectorAll('.finger-point')
                .forEach(point => {

                    point.classList.remove(
                        'selected'
                    );

                });

        }

        function updateFingerStatus() {
            if (fingerSelectionLocked) {
                return;
            }

            const count =
                activeTouches.size;

            if (count <= 0) {

                if (selectedFingerId) {

                    clearTimeout(resultTimeout);

                    resultTimeout = setTimeout(() => {

                        if (activeTouches.size === 0) {

                            fingerArea.innerHTML = '';

                            fingerStatus.innerText =
                                'Coloque os dedos.';

                            resetFingerSelection();

                        }

                    }, 3000);

                    return;

                }

                fingerStatus.innerText =
                    'Coloque os dedos.';

                resetFingerSelection();

                return;

            }

            fingerStatus.innerText =
                `${count} dedo${count > 1 ? 's' : ''} reconhecido${count > 1 ? 's' : ''}`;

            resetFingerSelection();

            fingerLoading.classList.add(
                'active'
            );

            selectorTimeout = setTimeout(() => {

                const keys =
                    Array.from(
                        activeTouches.keys()
                    );

                if (keys.length <= 0) {
                    return;
                }

                const randomId =
                    keys[
                    Math.floor(
                        Math.random() * keys.length
                    )
                    ];

                selectedFingerId =
                    randomId;
                fingerSelectionLocked = true;

                fingerLoading.classList.remove(
                    'active'
                );

                const selectedElement =
                    document.querySelector(
                        `[data-touch-id="${randomId}"]`
                    );

                if (selectedElement) {

                    selectedElement.classList.add(
                        'selected'
                    );
                    fingerStatus.innerText =
                        'Dedo selecionado!';

                }

            }, 3000);

        }

        function createFingerPoint(id, x, y) {

            const point =
                document.createElement('div');

            point.className =
                'finger-point';

            point.dataset.touchId = id;

            point.style.left = `${x}px`;
            point.style.top = `${y}px`;

            fingerArea.appendChild(point);

        }

        function moveFingerPoint(id, x, y) {

            const point =
                document.querySelector(
                    `[data-touch-id="${id}"]`
                );

            if (!point) {
                return;
            }

            point.style.left = `${x}px`;
            point.style.top = `${y}px`;

        }

        function removeFingerPoint(id) {

            const point =
                document.querySelector(
                    `[data-touch-id="${id}"]`
                );

            if (point) {
                point.remove();
            }

        }

        fingerArea.addEventListener(
            'touchstart',
            (e) => {
                if (fingerSelectionLocked) {
                    return;
                }

                e.preventDefault();
                e.stopPropagation();

                for (const touch of e.changedTouches) {

                    const rect =
                        fingerArea.getBoundingClientRect();

                    const x =
                        touch.clientX - rect.left;

                    const y =
                        touch.clientY - rect.top;

                    activeTouches.set(
                        touch.identifier,
                        { x, y }
                    );

                    createFingerPoint(
                        touch.identifier,
                        x,
                        y
                    );

                }

                updateFingerStatus();

            }
        );

        fingerArea.addEventListener(
            'touchmove',
            (e) => {
                if (fingerSelectionLocked) {
                    return;
                }
                e.preventDefault();
                e.stopPropagation();

                for (const touch of e.changedTouches) {

                    const rect =
                        fingerArea.getBoundingClientRect();

                    const x =
                        touch.clientX - rect.left;

                    const y =
                        touch.clientY - rect.top;

                    activeTouches.set(
                        touch.identifier,
                        { x, y }
                    );

                    moveFingerPoint(
                        touch.identifier,
                        x,
                        y
                    );

                }

            }
        );

        fingerArea.addEventListener(
            'touchend',
            (e) => {

                e.preventDefault();
                e.stopPropagation();

                if (
                    fingerSelectionLocked &&
                    cooldownStarted
                ) {
                    return;
                }

                for (const touch of e.changedTouches) {

                    activeTouches.delete(
                        touch.identifier
                    );

                }

                if (selectedFingerId) {

                    cooldownStarted = true;

                    fingerSelectionLocked = true;

                    clearTimeout(resultTimeout);

                    resultTimeout = setTimeout(() => {

                        cooldownStarted = false;

                        fingerSelectionLocked = false;

                        selectedFingerId = null;

                        activeTouches.clear();

                        fingerArea.innerHTML = '';

                        fingerStatus.innerText =
                            'Coloque os dedos.';

                        resetFingerSelection();

                    }, 3000);

                    return;

                }

                for (const touch of e.changedTouches) {

                    removeFingerPoint(
                        touch.identifier
                    );

                }

                updateFingerStatus();

            }
        );

        fingerSelectorButton.addEventListener(
            'click',
            (e) => {

                e.stopPropagation();

                clearTimeout(resultTimeout);
                clearTimeout(selectorTimeout);

                fingerSelectionLocked = false;

                selectedFingerId = null;

                activeTouches.clear();
                cooldownStarted = false;

                fingerArea.innerHTML = '';

                resetFingerSelection();

                fingerStatus.innerText =
                    'Coloque os dedos.';

                fingerSelectorModal.classList.add(
                    'active'
                );

                menuPanel.classList.remove(
                    'active'
                );

                filtersPanel.classList.remove(
                    'active'
                );

                document.body.classList.add(
                    'modal-open'
                );

            }
        );

        function closeFingerSelector() {

            clearTimeout(resultTimeout);
            clearTimeout(selectorTimeout);

            fingerSelectionLocked = false;

            selectedFingerId = null;
            cooldownStarted = false;

            activeTouches.clear();

            fingerArea.innerHTML = '';

            resetFingerSelection();
            

            fingerStatus.innerText =
                'Coloque os dedos.';

            fingerSelectorModal.classList.remove(
                'active'
            );

            document.body.classList.remove(
                'modal-open'
            );

        }

        closeFingerSelectorButton.addEventListener(
            'click',
            closeFingerSelector
        );

        fingerSelectorModal.addEventListener(
            'click',
            (e) => {

                if (
                    e.target === fingerSelectorModal
                ) {

                    return;

                }

                e.stopPropagation();

            }
        );
        document.addEventListener('click', (e) => {
            if (
                fingerSelectorModal.classList.contains(
                    'active'
                )
            ) {
                return;
            }

            const clickedInsideMenu =
                e.target.closest('.floating-menu');

            if (!clickedInsideMenu) {

                menuPanel.classList.remove('active');

                filtersPanel.classList.remove('active');

            }

        });

        clearFiltersButton.addEventListener('click', (e) => {

            e.stopPropagation();

            currentPlayers = null;
            playersRange.value = currentPlayers;

            playersLabel.innerText =
                '? jogadores';

            renderGames();

        });

        catalogButton.addEventListener('click', () => {

            location.reload();

        });

        diceButton.addEventListener('click', (e) => {

            e.stopPropagation();

            diceModal.classList.add('active');

            document.body.classList.add('modal-open');

        });

        function closeDiceModal() {

            diceModal.classList.remove('active');

            document.body.classList.remove('modal-open');

        }

        diceCloseButton.addEventListener(
            'click',
            closeDiceModal
        );

        diceModal.addEventListener('click', (e) => {

            if (e.target === diceModal) {

                closeDiceModal();

            }

        });
        diceRollButton.addEventListener('click', () => {

            let max =
                Number(diceInput.value);

            if (!max || max < 2) {

                max = 6;

                diceInput.value = 6;

            }

            diceResult.innerHTML =
                '<div class="dice-spinner"></div>';

            diceRollButton.classList.add(
                'dice-loading'
            );

            diceRollButton.innerText =
                'Rolando...';

            setTimeout(() => {

                const result =
                    Math.floor(Math.random() * max) + 1;

                diceResult.innerHTML =
                    result;

                diceRollButton.classList.remove(
                    'dice-loading'
                );

                diceRollButton.innerText =
                    'Lançar Dado!';

            }, 1000);

        });

        let timerInterval = null;

        let totalSeconds = 90;

        let timerRunning = false;

        function updateTimerDisplay() {

            const min =
                String(Math.floor(totalSeconds / 60))
                    .padStart(2, '0');

            const sec =
                String(totalSeconds % 60)
                    .padStart(2, '0');

            timerDisplay.innerText =
                `${min}:${sec}`;

        }

        function syncInputs() {

            minutesInput.value =
                Math.floor(totalSeconds / 60);

            secondsInput.value =
                totalSeconds % 60;

        }
        function updateTimerButtons() {

            if (timerRunning) {

                startTimerButton.style.display =
                    'none';

                pauseTimerButton.style.display =
                    'block';

                stopTimerButton.style.display =
                    'block';

                pauseTimerButton.innerText =
                    'Pausar';

                timerInputs.style.display =
                    'none';

            } else {

                timerInputs.style.display =
                    'flex';

                if (totalSeconds === (
                    Number(minutesInput.value) * 60 +
                    Number(secondsInput.value)
                )) {

                    startTimerButton.style.display =
                        'block';

                    pauseTimerButton.style.display =
                        'none';

                    stopTimerButton.style.display =
                        'none';

                } else {

                    startTimerButton.style.display =
                        'none';

                    pauseTimerButton.style.display =
                        'block';

                    stopTimerButton.style.display =
                        'block';

                    pauseTimerButton.innerText =
                        'Reiniciar';

                }

            }

        }
        function resetTimer() {
            timerDisplay.classList.remove(
                'timer-finished'
            );

            clearInterval(timerInterval);

            timerRunning = false;

            totalSeconds =
                (
                    Number(minutesInput.value) * 60
                ) +
                Number(secondsInput.value);

            updateTimerDisplay();

            updateTimerButtons();

        }

        timerButton.addEventListener('click', () => {

            timerModal.classList.add('active');

            document.body.classList.add('modal-open');

        });

        function closeTimerModal() {

            timerModal.classList.remove('active');

            document.body.classList.remove('modal-open');

        }

        timerCloseButton.addEventListener(
            'click',
            closeTimerModal
        );

        timerModal.addEventListener('click', (e) => {

            if (e.target === timerModal) {

                closeTimerModal();

            }

        });

        minutesInput.addEventListener('input', () => {

            if (minutesInput.value > 59) {
                minutesInput.value = 59;
            }

            if (minutesInput.value < 0) {
                minutesInput.value = 0;
            }

            resetTimer();

        });

        secondsInput.addEventListener('input', () => {

            if (secondsInput.value > 59) {
                secondsInput.value = 59;
            }

            if (secondsInput.value < 0) {
                secondsInput.value = 0;
            }

            resetTimer();

        });

        startTimerButton.addEventListener('click', () => {
            timerDisplay.classList.remove(
                'timer-finished'
            );

            if (timerRunning) {
                return;
            }
            if (totalSeconds <= 0) {

                totalSeconds =
                    (
                        Number(minutesInput.value) * 60
                    ) +
                    Number(secondsInput.value);

                updateTimerDisplay();

            }

            timerRunning = true;

            updateTimerButtons();

            timerInterval = setInterval(() => {

                if (totalSeconds <= 0) {

                    clearInterval(timerInterval);

                    timerRunning = false;

                    totalSeconds = 0;

                    updateTimerDisplay();

                    timerDisplay.classList.add(
                        'timer-finished'
                    );

                    startTimerButton.style.display =
                        'block';

                    pauseTimerButton.style.display =
                        'none';

                    stopTimerButton.style.display =
                        'none';

                    timerInputs.style.display =
                        'flex';

                    return;

                }

                totalSeconds--;

                updateTimerDisplay();

            }, 1000);

        });

        pauseTimerButton.addEventListener('click', () => {

            if (timerRunning) {

                clearInterval(timerInterval);

                timerRunning = false;

                updateTimerButtons();

            } else {

                timerRunning = true;

                updateTimerButtons();

                timerInterval = setInterval(() => {

                    if (totalSeconds <= 0) {

                        clearInterval(timerInterval);

                        timerRunning = false;

                        totalSeconds = 0;

                        updateTimerDisplay();

                        timerDisplay.classList.add(
                            'timer-finished'
                        );

                        startTimerButton.style.display =
                            'block';

                        pauseTimerButton.style.display =
                            'none';

                        stopTimerButton.style.display =
                            'none';

                        timerInputs.style.display =
                            'flex';

                        return;

                    }

                    totalSeconds--;

                    updateTimerDisplay();

                }, 1000);

            }

        });

        stopTimerButton.addEventListener('click', () => {

            clearInterval(timerInterval);

            timerRunning = false;

            totalSeconds =
                (
                    Number(minutesInput.value) * 60
                ) +
                Number(secondsInput.value);

            updateTimerDisplay();

            updateTimerButtons();

        });

        updateTimerDisplay();

        updateTimerButtons();
        fingerArea.addEventListener(
            'contextmenu',
            (e) => {

                e.preventDefault();

            }
        );
    </script>



</body>
