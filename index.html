<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Catálogo de Jogos</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #121212;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px;
        }

        .games-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
        }

        .game-card {
            position: relative;

            background: #1e1e1e;
            border-radius: 16px;
            overflow: hidden;

            transition: .2s ease;

            cursor: pointer;
        }

        .game-card:hover {
            transform: scale(1.03);
        }

        .game-image {
            width: 100%;
            aspect-ratio: 1 / 1.35;
            object-fit: cover;
            background: #2b2b2b;
        }

        .game-info {
            padding: 12px;
            text-align: center;
        }

        .game-title {
            font-size: 1rem;
            font-weight: bold;
            line-height: 1.3;
        }

        .favorite-button {
            position: absolute;

            top: 10px;
            right: 10px;

            width: 38px;
            height: 38px;

            border: none;
            border-radius: 50%;

            background: rgba(0, 0, 0, .65);

            color: white;

            font-size: 1.2rem;

            display: flex;
            align-items: center;
            justify-content: center;

            cursor: pointer;

            z-index: 10;

            backdrop-filter: blur(4px);

            transition: .2s ease;
        }

        .favorite-button.active {
            color: #ff4d6d;
        }

        .modal-favorite-button {
            position: absolute;

            top: 14px;
            right: 14px;

            width: 46px;
            height: 46px;

            border: none;
            border-radius: 50%;

            background: rgba(0, 0, 0, .72);

            color: white;

            font-size: 1.4rem;

            display: flex;
            align-items: center;
            justify-content: center;

            cursor: pointer;

            z-index: 30;

            backdrop-filter: blur(6px);

            transition: .2s ease;
        }

        .modal-favorite-button.active {
            color: #ff4d6d;
        }

        .modal {
            position: fixed;
            inset: 0;

            background: rgba(0, 0, 0, .92);

            opacity: 0;
            pointer-events: none;

            transition: .2s ease;

            z-index: 999;

            overflow-y: auto;

            padding: 20px;
        }

        .modal.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            position: relative;

            max-width: 700px;
            width: 100%;

            margin: 40px auto;

            background: #1b1b1b;

            border-radius: 20px;

            overflow: hidden;

            animation: zoom .2s ease;
        }

        .close-button {
            position: absolute;

            top: 14px;
            left: 14px;

            width: 42px;
            height: 42px;

            border: none;
            border-radius: 50%;

            background: rgba(0, 0, 0, .7);

            color: white;

            font-size: 1.4rem;

            cursor: pointer;

            z-index: 30;

            display: flex;
            align-items: center;
            justify-content: center;

            backdrop-filter: blur(5px);

            transition: .2s ease;
        }

        .close-button:hover {
            background: rgba(0, 0, 0, .95);
        }

        .modal-image {
            width: 100%;
            max-height: 75vh;

            object-fit: contain;

            background: #222;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-title {
            text-align: center;

            margin-top: 10px;

            font-size: 1.3rem;
            font-weight: bold;
        }

        .modal-rules {
            margin-top: 20px;

            line-height: 1.7;

            color: #ddd;

            white-space: pre-line;

            text-align: left;
        }

        .modal-rules h3 {
            margin-top: 18px;
            margin-bottom: 8px;

            color: white;
        }

        body.modal-open {
            overflow: hidden;
        }

        @keyframes zoom {
            from {
                transform: scale(.92);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @media (max-width:500px) {

            body {
                padding: 14px;
            }

            .games-container {
                grid-template-columns: repeat(2, 1fr);
                gap: 14px;
            }

            .game-title {
                font-size: .92rem;
            }

        }
    </style>
</head>

<body>

    <div class="games-container" id="gamesContainer"></div>

    <div class="modal" id="gameModal">

        <div class="modal-content">

            <button class="close-button" id="closeButton">✕</button>

            <button class="modal-favorite-button" id="modalFavoriteButton">
                ♥
            </button>
            <img id="modalImage" class="modal-image">

            <div class="modal-body">

                <div id="modalTitle" class="modal-title"></div>

                <div id="modalRules" class="modal-rules"></div>

            </div>

        </div>

    </div>

    <script>

        const container = document.getElementById('gamesContainer');

        const modal = document.getElementById('gameModal');

        const modalImage = document.getElementById('modalImage');
        const modalTitle = document.getElementById('modalTitle');
        const modalRules = document.getElementById('modalRules');

        const modalFavoriteButton =
            document.getElementById('modalFavoriteButton');
        let allGames = [];

        function getFavorites() {

            return JSON.parse(
                localStorage.getItem('favoriteGames') || '[]'
            );

        }

        function saveFavorites(favorites) {

            localStorage.setItem(
                'favoriteGames',
                JSON.stringify(favorites)
            );

        }

        function toggleFavorite(gameTitle) {

            let favorites = getFavorites();

            const index = favorites.indexOf(gameTitle);

            if (index >= 0) {

                favorites.splice(index, 1);

            } else {

                favorites.push(gameTitle);

            }

            saveFavorites(favorites);

            renderGames();

        }

        function renderGames() {

            container.innerHTML = '';

            const favorites = getFavorites();

            const favoriteGames = [];
            const normalGames = [];

            allGames.forEach(game => {

                if (favorites.includes(game.title)) {

                    favoriteGames.push(game);

                } else {

                    normalGames.push(game);

                }

            });

            favoriteGames.sort((a, b) =>
                favorites.indexOf(a.title) - favorites.indexOf(b.title)
            );

            normalGames.sort((a, b) =>
                a.title.localeCompare(
                    b.title,
                    'pt-BR',
                    { sensitivity: 'base' }
                )
            );

            const orderedGames = [
                ...favoriteGames,
                ...normalGames
            ];

            orderedGames.forEach(game => {

                const isFavorite =
                    favorites.includes(game.title);

                const card = document.createElement('div');

                card.className = 'game-card';

                card.innerHTML = `

                    <button class="favorite-button ${isFavorite ? 'active' : ''}">
                        ♥
                    </button>

                    <img src="images/${game.image}" class="game-image">

                    <div class="game-info">

                        <div class="game-title">${game.title}</div>

                    </div>
                `;

                const favoriteButton =
                    card.querySelector('.favorite-button');

                favoriteButton.addEventListener('click', (e) => {

                    e.stopPropagation();

                    toggleFavorite(game.title);

                });

                card.addEventListener('click', () => {

                    modalImage.src = `images/${game.image}`;

                    modalTitle.innerText = game.title;

                    modalRules.innerHTML = game.rules ?? "";

                    const favorites = getFavorites();

                    modalFavoriteButton.classList.toggle(
                        'active',
                        favorites.includes(game.title)
                    );

                    modalFavoriteButton.onclick = (e) => {

                        e.stopPropagation();

                        toggleFavorite(game.title);

                        modalFavoriteButton.classList.toggle(
                            'active'
                        );

                    };

                    modal.classList.add('active');

                    document.body.classList.add('modal-open');

                    history.pushState({ modal: true }, "");

                });

                container.appendChild(card);

            });

        }

        fetch('jogos.json')
            .then(response => response.json())
            .then(games => {

                allGames = games;

                renderGames();

            });

        function closeModal() {

            modal.classList.remove('active');

            document.body.classList.remove('modal-open');

        }

        closeButton.addEventListener('click', closeModal);

        modal.addEventListener('click', (e) => {

            if (e.target === modal) {

                closeModal();

            }

        });

        window.addEventListener('popstate', () => {

            if (modal.classList.contains('active')) {

                closeModal();

            }

        });

    </script>

</body>

</html>
