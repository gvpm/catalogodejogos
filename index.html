<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Catálogo de Jogos</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #121212;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px;
        }

        .games-container {

            display: grid;

            grid-template-columns:
                repeat(3, 220px);

            justify-content: center;

            gap: 20px;

        }

        .game-card {
            position: relative;

            background: #1e1e1e;
            border-radius: 16px;
            overflow: hidden;

            transition: .2s ease;

            cursor: pointer;
        }

        .game-card:hover {
            transform: scale(1.03);
        }

        .game-image {
            width: 100%;
            aspect-ratio: 1 / 1.35;
            object-fit: cover;
            background: #2b2b2b;
        }

        .game-info {
            padding: 12px;
            text-align: center;
        }

        .game-title {
            font-size: 1rem;
            font-weight: bold;
            line-height: 1.3;
        }

        .favorite-button {
            position: absolute;

            top: 10px;
            right: 10px;

            width: 38px;
            height: 38px;

            border: none;
            border-radius: 50%;

            background: rgba(0, 0, 0, .38);

            color: white;

            font-size: 1.2rem;

            display: flex;
            align-items: center;
            justify-content: center;

            cursor: pointer;

            z-index: 10;

            backdrop-filter: blur(1px);

            transition: .2s ease;
        }

        .favorite-button.active {
            color: #ff4d6d;
        }

        .modal-favorite-button {
            position: absolute;

            top: 14px;
            right: 14px;

            width: 46px;
            height: 46px;

            border: none;
            border-radius: 50%;

            background: rgba(0, 0, 0, .42);

            color: white;

            font-size: 1.4rem;

            display: flex;
            align-items: center;
            justify-content: center;

            cursor: pointer;

            z-index: 30;

            backdrop-filter: blur(1px);

            transition: .2s ease;
        }

        .modal-favorite-button.active {
            color: #ff4d6d;
        }

        .modal {
            position: fixed;
            inset: 0;

            background: rgba(0, 0, 0, .92);

            opacity: 0;
            pointer-events: none;

            transition: .2s ease;

            z-index: 999;

            overflow-y: auto;

            padding: 20px;
        }

        .modal.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            position: relative;

            max-width: 700px;
            width: 100%;

            margin: 40px auto;

            background: #1b1b1b;

            border-radius: 20px;

            overflow: hidden;

            animation: zoom .2s ease;
        }

        .close-button {
            position: absolute;

            top: 14px;
            left: 14px;

            width: 42px;
            height: 42px;

            border: none;
            border-radius: 50%;

            background: rgba(0, 0, 0, .42);

            color: white;

            font-size: 1.4rem;

            cursor: pointer;

            z-index: 30;

            display: flex;
            align-items: center;
            justify-content: center;

            backdrop-filter: blur(1px);

            transition: .2s ease;
        }

        .close-button:hover {
            background: rgba(0, 0, 0, .95);
        }

        .modal-image {
            width: 100%;
            max-height: 75vh;

            object-fit: contain;

            background: #222;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-title {
            text-align: center;

            margin-top: 10px;

            font-size: 1.3rem;
            font-weight: bold;
        }

        .modal-rules {
            margin-top: 20px;

            line-height: 1.7;

            color: #ddd;

            white-space: pre-line;

            text-align: left;
        }

        .modal-rules h3 {
            margin-top: 18px;
            margin-bottom: 8px;

            color: white;
        }

        body.modal-open {
            overflow: hidden;
        }

        @keyframes zoom {
            from {
                transform: scale(.92);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .games-count {
            margin-top: 28px;

            text-align: center;

            color: rgba(255, 255, 255, .6);

            font-size: .95rem;
        }

        .floating-menu {
            position: fixed;

            right: 20px;
            bottom: 20px;

            z-index: 9999;
        }

        .menu-button {
            width: 58px;
            height: 58px;

            border: none;
            border-radius: 50%;

            background: #1f1f1f;

            color: white;

            font-size: 1.5rem;

            cursor: pointer;

            box-shadow: 0 4px 18px rgba(0, 0, 0, .35);
        }

        .filters-panel {
            position: absolute;

            right: 190px;
            bottom: 74px;

            width: 260px;

            background: #1b1b1b;

            border-radius: 18px;

            padding: 18px;

            opacity: 0;
            pointer-events: none;

            transform: translateY(10px);

            transition: .2s ease;
        }

        .menu-panel {
            position: absolute;

            right: 0;
            bottom: 74px;

            width: 180px;

            background: #1b1b1b;

            border-radius: 18px;

            padding: 12px;

            opacity: 0;
            pointer-events: none;

            transform: translateY(10px);

            transition: .2s ease;
        }

        .menu-panel.active {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0);
        }

        .menu-option {
            width: 100%;

            border: none;

            background: #262626;

            color: white;

            padding: 14px;

            border-radius: 12px;

            cursor: pointer;

            font-size: 1rem;

            text-align: left;
        }

        .clear-filters-button {
            margin-top: 10px;

            background: #5a1d1d;

            color: #ff8d8d;

            display: none;
        }

        .clear-filters-button.active {
            display: block;
        }

        .filters-panel.active {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0);
        }

        .filters-title {
            font-size: 1rem;
            font-weight: bold;

            margin-bottom: 14px;
        }

        .range-values {
            display: flex;
            justify-content: center;

            margin-bottom: 10px;

            color: #aaa;
        }

        .range-group {
            position: relative;
        }

        .range-group input {
            width: 100%;
        }

        @media (max-width:700px) {

            body {
                padding: 16px;
            }

            .games-container {

                grid-template-columns:
                    repeat(2, calc(50vw - 24px)) !important;

                gap: 14px !important;

                justify-content: center !important;

            }

            .game-card {
                width: 100%;
            }

            .game-title {
                font-size: 1rem;
            }

            .game-info {
                padding: 14px;
            }

            .menu-button {
                width: 86px !important;
                height: 86px !important;

                font-size: 2rem !important;
            }

            .favorite-button {

                width: 42px !important;
                height: 42px !important;

                font-size: 1.5rem !important;
            }

            .modal-favorite-button {

                width: 52px !important;
                height: 52px !important;

                font-size: 1.8rem !important;
            }

            .close-button {
                width: 52px !important;
                height: 52px !important;

                font-size: 1.8rem !important;
            }

            .menu-panel {

                width: 220px !important;

                bottom: 96px !important;
            }

            .filters-panel {

                width: 240px !important;

                right: 0 !important;

                bottom: 180px !important;
            }

            .menu-option {

                padding: 20px !important;

                font-size: 1.08rem !important;
            }

            .range-group input {

                height: 40px !important;
            }

        }
    </style>
</head>

<body>

    <div class="games-container" id="gamesContainer"></div>

    <div class="games-count" id="gamesCount"></div>
    <div class="modal" id="gameModal">

        <div class="modal-content">

            <button class="close-button" id="closeButton">✕</button>

            <button class="modal-favorite-button" id="modalFavoriteButton">
                ♥
            </button>
            <img id="modalImage" class="modal-image">

            <div class="modal-body">

                <div id="modalTitle" class="modal-title"></div>

                <div id="modalRules" class="modal-rules"></div>

            </div>

        </div>

    </div>

    <div class="floating-menu">

        <div class="menu-panel" id="menuPanel">

            <button class="menu-option" id="filtersButton">
                ⛃ Filtros
            </button>

            <button class="menu-option clear-filters-button" id="clearFiltersButton">

                🗑 Limpar filtros

            </button>

        </div>

        <div class="filters-panel" id="filtersPanel">

            <div class="filters-title">
                Jogadores
            </div>

            <div class="range-values">
                <span id="playersLabel"></span>
            </div>

            <div class="range-group">
                <input type="range" id="playersRange">
            </div>

        </div>

        <button class="menu-button" id="menuButton">
            ☰
        </button>

    </div>

    <script>

        const container = document.getElementById('gamesContainer');
        const gamesCount =
            document.getElementById('gamesCount');

        const modal = document.getElementById('gameModal');

        const modalImage = document.getElementById('modalImage');
        const modalTitle = document.getElementById('modalTitle');
        const modalRules = document.getElementById('modalRules');

        const modalFavoriteButton =
            document.getElementById('modalFavoriteButton');

        const menuButton =
            document.getElementById('menuButton');

        const filtersPanel =
            document.getElementById('filtersPanel');

        const playersRange =
            document.getElementById('playersRange');

        const playersLabel =
            document.getElementById('playersLabel');

        const closeButton =
            document.getElementById('closeButton');

        const menuPanel =
            document.getElementById('menuPanel');

        const filtersButton =
            document.getElementById('filtersButton');


        const clearFiltersButton =
            document.getElementById('clearFiltersButton');
        let allGames = [];

        let globalMinPlayers = 1;
        let globalMaxPlayers = 12;

        let currentPlayers = null;


        function getFavorites() {

            return JSON.parse(
                localStorage.getItem('favoriteGames') || '[]'
            );

        }

        function saveFavorites(favorites) {

            localStorage.setItem(
                'favoriteGames',
                JSON.stringify(favorites)
            );

        }

        function toggleFavorite(gameTitle) {

            let favorites = getFavorites();

            const index = favorites.indexOf(gameTitle);

            if (index >= 0) {

                favorites.splice(index, 1);

            } else {

                favorites.push(gameTitle);

            }

            saveFavorites(favorites);

            renderGames();

        }
        function updateFiltersUI() {

            const hasFilter =
                currentPlayers !== null;

            clearFiltersButton.classList.toggle(
                'active',
                hasFilter
            );

        }

        function renderGames() {

            container.innerHTML = '';

            const favorites = getFavorites();

            const favoriteGames = [];
            const normalGames = [];

            allGames
                .filter(game => {

                    if (
                        game.minPlayers === 0 &&
                        game.maxPlayers === 0
                    ) {
                        return true;
                    }

                    if (currentPlayers === null) {
                        return true;
                    }

                    return (
                        currentPlayers >= game.minPlayers &&
                        currentPlayers <= game.maxPlayers
                    );

                })
                .forEach(game => {

                    if (favorites.includes(game.title)) {

                        favoriteGames.push(game);

                    } else {

                        normalGames.push(game);

                    }

                });

            favoriteGames.sort((a, b) =>
                favorites.indexOf(a.title) - favorites.indexOf(b.title)
            );

            normalGames.sort((a, b) =>
                a.title.localeCompare(
                    b.title,
                    'pt-BR',
                    { sensitivity: 'base' }
                )
            );

            const orderedGames = [
                ...favoriteGames,
                ...normalGames
            ];
            gamesCount.innerText =
                `${orderedGames.length} Jogos`;

            orderedGames.forEach(game => {

                const isFavorite =
                    favorites.includes(game.title);

                const card = document.createElement('div');

                card.className = 'game-card';

                card.innerHTML = `

                    <button class="favorite-button ${isFavorite ? 'active' : ''}">
                        ♥
                    </button>

                    <img src="images/${game.image}" class="game-image">

                    <div class="game-info">

                        <div class="game-title">${game.title}</div>

                    </div>
                `;

                const favoriteButton =
                    card.querySelector('.favorite-button');

                favoriteButton.addEventListener('click', (e) => {

                    e.stopPropagation();

                    toggleFavorite(game.title);

                });

                card.addEventListener('click', () => {

                    modalImage.src = `images/${game.image}`;

                    modalTitle.innerText = game.title;

                    modalRules.innerHTML = game.rules ?? "";

                    const favorites = getFavorites();

                    modalFavoriteButton.classList.toggle(
                        'active',
                        favorites.includes(game.title)
                    );

                    modalFavoriteButton.onclick = (e) => {

                        e.stopPropagation();

                        toggleFavorite(game.title);

                        modalFavoriteButton.classList.toggle(
                            'active'
                        );

                    };

                    modal.classList.add('active');

                    document.body.classList.add('modal-open');

                    history.pushState({ modal: true }, "");

                });

                container.appendChild(card);

            });
            updateFiltersUI();


        }

        fetch('./jogos.json')
            .then(response => response.json())
            .then(games => {

                allGames = games;
                const validGames = games.filter(g => {

                    return (
                        Number.isFinite(Number(g.minPlayers)) &&
                        Number.isFinite(Number(g.maxPlayers)) &&
                        Number(g.minPlayers) > 0 &&
                        Number(g.maxPlayers) > 0
                    );

                });

                if (validGames.length > 0) {

                    globalMinPlayers = Math.min(
                        ...validGames.map(g =>
                            Number(g.minPlayers)
                        )
                    );

                    globalMaxPlayers = Math.max(
                        ...validGames.map(g =>
                            Number(g.maxPlayers)
                        )
                    );

                } else {

                    globalMinPlayers = 1;
                    globalMaxPlayers = 12;

                }

                currentPlayers = null;

                playersRange.min = globalMinPlayers;
                playersRange.max = globalMaxPlayers;

                playersRange.value = globalMinPlayers;

                playersLabel.innerText =
                    '? jogadores';
                renderGames();

            });

        function closeModal() {

            modal.classList.remove('active');

            document.body.classList.remove('modal-open');

        }

        closeButton.addEventListener('click', closeModal);

        modal.addEventListener('click', (e) => {

            if (e.target === modal) {

                closeModal();

            }

        });

        window.addEventListener('popstate', () => {

            if (modal.classList.contains('active')) {

                closeModal();

            }

        });

        menuButton.addEventListener('click', (e) => {

            e.stopPropagation();

            menuPanel.classList.toggle('active');

            filtersPanel.classList.remove('active');

        });

        filtersButton.addEventListener('click', (e) => {

            e.stopPropagation();

            filtersPanel.classList.toggle('active');

        });

        playersRange.addEventListener('input', () => {

            currentPlayers =
                Number(playersRange.value);

            playersLabel.innerText =
                `${currentPlayers} jogadores`;

            renderGames();

        });
        document.addEventListener('click', (e) => {

            const clickedInsideMenu =
                e.target.closest('.floating-menu');

            if (!clickedInsideMenu) {

                menuPanel.classList.remove('active');

                filtersPanel.classList.remove('active');

            }

        });

        clearFiltersButton.addEventListener('click', (e) => {

            e.stopPropagation();

            currentPlayers = null;
            playersRange.value = currentPlayers;

            playersLabel.innerText =
                '? jogadores';

            renderGames();

        });
    </script>



</body>

</html>
